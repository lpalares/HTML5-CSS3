<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
    <style>
        main {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 80vw;
            width: 100%;
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <h1>Parágrafos e Quebras de Linha</h1>
            <hr>
            <p>Você pode escrever um parágrafo de qualquer jeito. Basta colocar tudo no meio do par de tag &lt;p&gt; e &lt;/p&gt;</p>
            <p>Se precisar quebrar o texto em algum lugar específico como esse, <br>você pode usar a tag &lt;br&gt;.</p>
        </div>
    </main>
</body>
</html>
