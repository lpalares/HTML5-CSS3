<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro Exercício</title>
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        body, html {
            width: 100vw;
        }

        main {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .container {
            background-color: wheat;
            margin: auto;
            border-radius: 8px;
            padding: 15px;
            max-width: 90vw;
            width: 100%;
        }
        
        hr {
            margin: 10px 0px;
        }

        p {
            line-height: 1.5em;
        }

        h2 {
            margin-bottom: 10px;
        }

        a {
            color: black;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            color: blueviolet;
            text-decoration: underline;
        }

        a::after {
            content: " [externo]";
            font-size: 0.7em;
            font-weight: normal;
        }

        @media screen and (max-width: 140px) {
            h1 {
                font-size: 1em;
            }

            h2 {
                font-size: 0.75em;
            }

            p {
                font-size: 0.7em;
            }
        }

        @media screen and (min-width:141px) and (max-width: 200px) {
            h1 {
                font-size: 1.3em;
            }

            h2 {
                font-size: 1em;
            }

            p {
                font-size: 0.9em;
            }
        }

        @media screen and (min-width: 1000px) {
            .container {
                max-width: 70vw;
            }

            h1 {
                font-size: 2.3em;
            }

            h2 {
                font-size: 1.75em;
            }

            p {
                font-size: 1.05em;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <h1>Olá, mundo!</h1>
            <hr>
            <p>Esse é o meu primeiro documento HTML. Estou muito feliz!</p>
            <p>Este é um momento único: estou criando um site!</p>
            <hr>
            <h2>Atualização</h2>
            <p>Eu já concluí esse curso no Youtube e agora estou refazendo-o no site oficial do <a href="https://www.cursoemvideo.com" target="_blank">Curso em vídeo</a>.</p>
        </div>
    </main>
</body>
</html>
